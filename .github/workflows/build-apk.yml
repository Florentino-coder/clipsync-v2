name: Build Release Files

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Flutter Android project
        run: |
          flutter create --platforms=android --org com.clipsync mobile_build
          cp mobile/pubspec.yaml mobile_build/pubspec.yaml
          rm -rf mobile_build/lib
          cp -R mobile/lib mobile_build/lib
          cp mobile/android/app/src/main/AndroidManifest.xml mobile_build/android/app/src/main/AndroidManifest.xml
          mkdir -p mobile_build/android/app/src/main/kotlin
          cp -R mobile/android/app/src/main/kotlin/* mobile_build/android/app/src/main/kotlin/
          if [ -d mobile/android/app/src/main/res ]; then
            cp -R mobile/android/app/src/main/res/* mobile_build/android/app/src/main/res/
          fi
          perl -0pi -e 's/^\s*ndkVersion\s*=\s*flutter\.ndkVersion\s*\n//mg' mobile_build/android/app/build.gradle.kts
          cat > mobile_build/android/app/proguard-rules.pro <<'EOF'
          # Flutter runtime and plugin entry points.
          -keep class io.flutter.** { *; }
          -dontwarn io.flutter.embedding.**

          # ClipSync plugins that are called through Android platform channels.
          -keep class dev.steenbakker.mobile_scanner.** { *; }
          -keep class com.pravera.flutter_foreground_task.** { *; }

          # CameraX and barcode scanning are sensitive to R8 trimming on some devices.
          -keep class androidx.camera.** { *; }
          -dontwarn androidx.camera.**
          -keep class com.google.mlkit.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_barcode.** { *; }
          -keep class com.google.android.libraries.barhopper.** { *; }
          -keep class com.google.android.odml.image.** { *; }
          -keep class com.google.photos.** { *; }
          -dontwarn com.google.mlkit.**
          -dontwarn com.google.android.gms.**

          # Keep metadata used by reflection and generated native bindings.
          -keepattributes *Annotation*
          -keepattributes Signature
          -keepattributes InnerClasses,EnclosingMethod
          -keepclassmembers class * extends java.lang.Enum {
              <fields>;
              public static **[] values();
              public static ** valueOf(java.lang.String);
          }
          EOF

      - name: Configure Android release signing
        working-directory: mobile_build
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/clipsync-upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=clipsync-upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle.kts")
          text = path.read_text()
          text = (
              'import java.util.Properties\n'
              'import java.io.FileInputStream\n\n'
              + text
          )
          text = text.replace(
              "android {\n",
              (
                  'val keystoreProperties = Properties()\n'
                  'val keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n\n'
                  "android {\n"
              ),
              1,
          )
          text = text.replace(
              "    buildTypes {\n"
              "        release {\n"
              "            // TODO: Add your own signing config for the release build.\n"
              "            // Signing with the debug keys for now, so `flutter run --release` works.\n"
              "            signingConfig = signingConfigs.getByName(\"debug\")\n"
              "        }\n"
              "    }\n",
              "    signingConfigs {\n"
              "        create(\"release\") {\n"
              "            keyAlias = keystoreProperties[\"keyAlias\"] as String\n"
              "            keyPassword = keystoreProperties[\"keyPassword\"] as String\n"
              "            storeFile = file(keystoreProperties[\"storeFile\"] as String)\n"
              "            storePassword = keystoreProperties[\"storePassword\"] as String\n"
              "        }\n"
              "    }\n"
              "\n"
              "    buildTypes {\n"
              "        release {\n"
              "            isMinifyEnabled = true\n"
              "            isShrinkResources = true\n"
              "            proguardFiles(\n"
              "                getDefaultProguardFile(\"proguard-android-optimize.txt\"),\n"
              "                \"proguard-rules.pro\",\n"
              "            )\n"
              "            signingConfig = signingConfigs.getByName(\"release\")\n"
              "        }\n"
              "    }\n",
          )
          path.write_text(text)
          PY

      - name: Install dependencies
        working-directory: mobile_build
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile_build
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp mobile_build/build/app/outputs/flutter-apk/app-release.apk artifacts/ClipSync.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipSync-APK
          path: artifacts/ClipSync.apk

  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Build Windows EXE
        working-directory: pc
        shell: pwsh
        run: .\build_exe.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        working-directory: pc
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\ClipSyncPC.iss'

      - name: Prepare EXE artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item pc\dist\ClipSyncPC.exe artifacts\ClipSyncPC.exe -Force
          Copy-Item pc\dist\ClipSyncPC_Setup.exe artifacts\ClipSyncPC_Setup.exe -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipSync-Windows-EXE
          path: |
            artifacts/ClipSyncPC.exe
            artifacts/ClipSyncPC_Setup.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-apk
      - build-windows-exe
    if: github.ref == 'refs/heads/master'
    env:
      PUBLIC_RELEASE_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ClipSync-APK
          path: release

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: ClipSync-Windows-EXE
          path: release

      - name: Upload files to repository release
        if: github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          tag: android-latest
          name: ClipSync Test Builds
          body: Latest release APK, Windows EXE, Windows setup installer, and update manifest built from master@${{ github.sha }}.
          artifacts: release/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true

      - name: Upload APK to public release
        if: github.ref == 'refs/heads/master' && env.PUBLIC_RELEASE_TOKEN != ''
        uses: ncipollo/release-action@v1
        with:
          owner: Florentino-coder
          repo: clipsync-apk
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          tag: android-latest
          name: ClipSync Android APK
          body: Latest release APK built from Florentino-coder/clipsync@${{ github.sha }}.
          commit: main
          artifacts: release/ClipSync.apk
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
